<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickItUp | Pure & Solid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        neutral: {
                            950: '#0a0a0a',
                        }
                    },
                    boxShadow: {
                        'soft': '0 2px 8px rgba(0, 0, 0, 0.05)',
                        'depth': '0 10px 25px -5px rgba(0, 0, 0, 0.12), 0 8px 10px -6px rgba(0, 0, 0, 0.08)',
                        'inner-solid': 'inset 0 2px 5px rgba(0, 0, 0, 0.08)',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }

        .ui-element {
            @apply transition-all duration-200 ease-in-out;
        }

        /* Cartes avec relief marqué et arrondis serrés (8px) */
        .minimal-card {
            @apply bg-slate-100 dark:bg-neutral-900 border border-slate-300 dark:border-white/10 rounded-lg shadow-sm;
        }

        /* Zones creuses */
        .inset-area {
            @apply bg-slate-200/60 dark:bg-black/40 border border-slate-300/50 dark:border-white/5 rounded-md;
        }

        /* Boutons d'action unifiés */
        .action-btn {
            @apply flex-shrink-0 px-5 py-3 bg-white dark:bg-neutral-800 text-slate-900 dark:text-white rounded-md font-800 text-[10px] uppercase tracking-widest border border-slate-300 dark:border-white/10 hover:bg-slate-50 active:bg-slate-200 ui-element shadow-sm;
        }

        #wheelContainer {
            filter: drop-shadow(0 15px 35px rgba(0,0,0,0.15));
        }

        .dark #wheelContainer {
            filter: drop-shadow(0 15px 35px rgba(0,0,0,0.5));
        }

        .pointer-hit {
            animation: hit 0.1s ease-out;
        }

        @keyframes hit {
            0% { transform: translateX(-50%) rotate(0deg); }
            50% { transform: translateX(-50%) rotate(-10deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body class="bg-[#dcdcdc] dark:bg-neutral-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-500 pb-12">

    <!-- Thèmes / Start Overlay -->
    <div id="startOverlay" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-6 bg-slate-300/90 dark:bg-black/90 backdrop-blur-sm">
        <div class="max-w-3xl w-full text-center">
            <h2 class="text-4xl font-800 mb-2 tracking-tighter">Univers de départ</h2>
            <p class="text-slate-600 dark:text-slate-400 mb-12 text-sm font-medium">Choisissez un thème pour initialiser la roue.</p>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
                <button onclick="applyTemplate('games')" class="minimal-card bg-white dark:bg-neutral-800 p-8 hover:bg-slate-50 dark:hover:bg-neutral-700 ui-element group border-b-4 border-slate-300 dark:border-white/5 active:translate-y-1 active:border-b-0">
                    <span class="text-4xl block mb-4 group-hover:scale-110 ui-element">🎮</span>
                    <span class="text-[10px] font-bold uppercase tracking-widest opacity-60">Jeux</span>
                </button>
                <button onclick="applyTemplate('food')" class="minimal-card bg-white dark:bg-neutral-800 p-8 hover:bg-slate-50 dark:hover:bg-neutral-700 ui-element group border-b-4 border-slate-300 dark:border-white/5 active:translate-y-1 active:border-b-0">
                    <span class="text-4xl block mb-4 group-hover:scale-110 ui-element">🍕</span>
                    <span class="text-[10px] font-bold uppercase tracking-widest opacity-60">Cuisine</span>
                </button>
                <button onclick="applyTemplate('movies')" class="minimal-card bg-white dark:bg-neutral-800 p-8 hover:bg-slate-50 dark:hover:bg-neutral-700 ui-element group border-b-4 border-slate-300 dark:border-white/5 active:translate-y-1 active:border-b-0">
                    <span class="text-4xl block mb-4 group-hover:scale-110 ui-element">🍿</span>
                    <span class="text-[10px] font-bold uppercase tracking-widest opacity-60">Films</span>
                </button>
                <button onclick="applyTemplate('activities')" class="minimal-card bg-white dark:bg-neutral-800 p-8 hover:bg-slate-50 dark:hover:bg-neutral-700 ui-element group border-b-4 border-slate-300 dark:border-white/5 active:translate-y-1 active:border-b-0">
                    <span class="text-4xl block mb-4 group-hover:scale-110 ui-element">🏃</span>
                    <span class="text-[10px] font-bold uppercase tracking-widest opacity-60">Loisirs</span>
                </button>
            </div>
            <button onclick="closeStartOverlay()" class="bg-white dark:bg-neutral-800 border border-slate-400 dark:border-white/10 px-8 py-3 rounded-md text-[10px] font-black uppercase tracking-widest transition-colors hover:bg-slate-100">Passer l'introduction</button>
        </div>
    </div>

    <!-- Modal de création de roue -->
    <div id="createWheelModal" class="hidden fixed inset-0 z-[210] flex items-center justify-center p-6 bg-black/20 dark:bg-black/60 backdrop-blur-sm">
        <div class="max-w-sm w-full minimal-card bg-white dark:bg-neutral-900 p-8 border-2 border-slate-400">
            <h3 class="text-xl font-800 mb-6 tracking-tight text-center">Nouvelle liste</h3>
            <div class="inset-area p-1 mb-8">
                <input type="text" id="newWheelNameInput" class="w-full bg-transparent px-5 py-4 outline-none font-semibold text-center" placeholder="Nom de la liste">
            </div>
            <div class="flex gap-3">
                <button onclick="closeCreateWheelModal()" class="flex-1 text-slate-500 font-bold text-xs uppercase tracking-widest">Annuler</button>
                <button onclick="confirmCreateWheel()" class="flex-1 bg-slate-900 dark:bg-white text-white dark:text-black py-4 rounded-md font-bold text-xs uppercase tracking-widest hover:bg-black ui-element">Créer</button>
            </div>
        </div>
    </div>

    <div class="max-w-[1300px] mx-auto p-4 lg:p-12 space-y-10">
        
        <header class="flex justify-between items-center px-4">
            <h1 class="text-2xl font-900 tracking-tighter uppercase">PickItUp<span class="text-slate-500 font-400">.</span></h1>
            <div class="flex items-center gap-2 bg-slate-100 dark:bg-neutral-900 p-1 rounded-md border border-slate-300 dark:border-white/10">
                <button onclick="toggleDarkMode()" class="w-9 h-9 flex items-center justify-center text-slate-500 hover:text-slate-900 dark:hover:text-white ui-element">
                    <i id="themeIcon" class="fas fa-moon"></i>
                </button>
                <button onclick="toggleSound()" id="soundBtn" class="w-9 h-9 flex items-center justify-center text-slate-500 hover:text-slate-900 dark:hover:text-white ui-element">
                    <i class="fas fa-volume-up"></i>
                </button>
                <button onclick="openStartOverlay()" class="ml-2 px-5 py-2 text-[10px] font-black uppercase tracking-widest bg-slate-300 dark:bg-white text-slate-900 dark:text-black rounded-sm hover:bg-slate-400 ui-element">Thèmes</button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">
            
            <!-- Sidebar GAUCHE -->
            <div class="lg:col-span-3 space-y-8 order-2 lg:order-1">
                <div class="minimal-card p-6 bg-slate-50">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">Bibliothèque</span>
                        <button onclick="openCreateWheelModal()" class="w-7 h-7 flex items-center justify-center bg-white dark:bg-white/5 rounded-sm border border-slate-300 dark:border-white/10 text-slate-400 hover:text-slate-900 dark:hover:text-white ui-element">
                            <i class="fas fa-plus text-[10px]"></i>
                        </button>
                    </div>
                    <div id="wheelTabs" class="space-y-1.5 max-h-[250px] overflow-y-auto scrollbar-hide"></div>
                </div>

                <!-- Section IA Assistant -->
                <div class="minimal-card p-8 bg-slate-900 dark:bg-white text-white dark:text-slate-900 border-2 border-slate-800 dark:border-slate-200">
                    <h3 class="text-xs font-bold uppercase tracking-widest mb-6 opacity-60">Assistant IA</h3>
                    <div class="space-y-4 relative z-10">
                        <div class="inset-area bg-white/10 dark:bg-black/5 p-3 flex items-center border border-white/10">
                            <input type="text" id="aiPrompt" placeholder="8 destinations..." class="flex-1 bg-transparent py-1 text-xs outline-none font-medium placeholder:text-white/30 dark:placeholder:text-black/30">
                        </div>
                        
                        <div id="aiProgressContainer" class="hidden space-y-2">
                            <div class="flex justify-between items-center">
                                <span class="text-[9px] font-black uppercase tracking-widest opacity-50">Génération...</span>
                                <span id="aiProgressPercent" class="text-[9px] font-black uppercase tracking-widest">0%</span>
                            </div>
                            <div class="w-full h-1.5 bg-white/10 dark:bg-black/10 rounded-full overflow-hidden">
                                <div id="aiProgressBar" class="h-full bg-white dark:bg-black transition-all duration-300" style="width: 0%"></div>
                            </div>
                        </div>

                        <button onclick="generateWithAI()" id="aiBtn" class="action-btn w-full">
                            Générer la liste
                        </button>
                    </div>
                </div>
            </div>

            <!-- Centre : La Roue -->
            <div class="lg:col-span-6 flex flex-col items-center order-1 lg:order-2">
                <div class="w-full minimal-card p-8 lg:p-14 relative flex flex-col items-center border-2 border-slate-300 bg-white">
                    <div id="wheelContainer" class="relative w-full aspect-square max-w-[480px] group cursor-grab active:cursor-grabbing">
                        <div id="wheelPointer" class="absolute top-[-5px] left-1/2 -translate-x-1/2 z-20 transition-transform">
                            <div class="w-7 h-10 bg-slate-900 dark:bg-white rounded-b flex items-center justify-center border-t-2 border-slate-900">
                                <div class="w-1.5 h-1.5 bg-white dark:bg-black rounded-full"></div>
                            </div>
                        </div>
                        <canvas id="wheelCanvas" width="1000" height="1000" class="w-full h-full"></canvas>
                    </div>

                    <div class="mt-12 w-full max-w-[280px]">
                        <button id="spinBtn" onclick="spinWheel()" class="w-full py-5 bg-slate-900 dark:bg-white text-white dark:text-black font-900 text-[11px] uppercase tracking-[0.2em] rounded border-b-4 border-slate-700 dark:border-slate-300 active:border-b-0 active:translate-y-1 transition-all disabled:opacity-30">
                            Tirer au sort
                        </button>
                    </div>
                </div>
            </div>

            <!-- Sidebar DROITE -->
            <div class="lg:col-span-3 space-y-8 order-3">
                <div class="minimal-card p-6 bg-slate-50">
                    <!-- Titre Éditable avec Crayon -->
                    <div class="flex items-center gap-3 mb-6 group">
                        <div class="w-1 h-4 bg-slate-900 dark:bg-white rounded-full"></div>
                        <h3 id="currentWheelName" 
                            class="font-800 text-sm outline-none tracking-tight flex-1" 
                            contenteditable="true" 
                            onkeydown="if(event.key === 'Enter') { event.preventDefault(); this.blur(); }"
                            onblur="updateWheelName(this.textContent)">Ma Roue</h3>
                        <button onclick="focusWheelTitle()" class="w-6 h-6 flex items-center justify-center text-slate-400 hover:text-slate-900 dark:hover:text-white ui-element">
                            <i class="fas fa-pen text-[9px]"></i>
                        </button>
                    </div>
                    
                    <!-- Bouton "+" Corrigé ici -->
                    <div class="inset-area bg-white dark:bg-black/20 p-1.5 flex items-center mb-6 border border-slate-300">
                        <input type="text" id="optionInput" class="flex-1 bg-transparent px-3 py-3 text-[11px] font-semibold outline-none" placeholder="Ajouter un choix">
                        <button onclick="addOption()" class="action-btn">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                    
                    <div id="optionsList" class="space-y-1 max-h-[300px] overflow-y-auto scrollbar-hide pr-1"></div>
                </div>

                <div class="minimal-card p-6 bg-slate-100/50">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-[9px] font-black uppercase tracking-widest text-slate-400">Statistiques</span>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-slate-400">Total :</span>
                            <span class="text-xs font-900 text-slate-600 dark:text-slate-300" id="statDraws">0</span>
                        </div>
                    </div>
                    <div id="historyStats" class="space-y-1.5 max-h-[300px] overflow-y-auto scrollbar-hide pr-1"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Résultat -->
    <div id="resultModal" class="hidden fixed inset-0 z-[300] flex items-center justify-center p-6 bg-black/40 backdrop-blur-md">
        <div class="max-w-md w-full text-center p-12 bg-white dark:bg-neutral-900 rounded border-2 border-slate-900 shadow-2xl">
            <div id="winnerEmoji" class="text-6xl mb-8 animate-bounce">✨</div>
            <span class="text-[9px] font-black uppercase tracking-[0.4em] text-slate-400 block mb-3">Le sort a désigné</span>
            <h2 id="winnerName" class="text-5xl font-900 tracking-tighter leading-tight mb-10 uppercase">Gagnant</h2>
            
            <button onclick="closeModal()" class="w-full py-5 bg-slate-900 dark:bg-white text-white dark:text-black rounded font-900 uppercase tracking-widest text-[11px] hover:bg-black ui-element">
                C'est noté !
            </button>
        </div>
    </div>

    <script>
        const templates = {
            games: { name: "Jeux Vidéo", items: ["Minecraft", "Elden Ring", "Fortnite", "Valorant", "Zelda", "GTA V", "FIFA", "CS:GO"] },
            food: { name: "Plats", items: ["Pizza", "Burger", "Sushi", "Tacos", "Pâtes", "Ramen", "Steak", "Salade"] },
            movies: { name: "Cinéma", items: ["Inception", "Interstellar", "Spider-Man", "Pulp Fiction", "Matrix", "Avengers", "Dune", "Shrek"] },
            activities: { name: "Loisirs", items: ["Musculation", "Netflix", "Lecture", "Sieste", "Gaming", "Cuisine", "Dessin", "Sortie"] }
        };

        let wheels = JSON.parse(localStorage.getItem('pickitup-wheels')) || [{ id: 1, name: "Ma Roue", items: [] }];
        let currentWheelIdx = parseInt(localStorage.getItem('pickitup-current')) || 0;
        if (currentWheelIdx >= wheels.length) currentWheelIdx = 0;

        let isSpinning = false;
        let rotation = 0;
        let angularVelocity = 0;
        let totalDraws = parseInt(localStorage.getItem('pickitup-draws')) || 0;
        let soundEnabled = localStorage.getItem('pickitup-sound') !== 'false';
        const apiKey = ""; 

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        let isDragging = false, lastMouseAngle = 0, lastTimestamp = 0;

        canvas.addEventListener('mousedown', startDrag);
        canvas.addEventListener('mousemove', handleDrag);
        window.addEventListener('mouseup', endDrag);
        canvas.addEventListener('touchstart', (e) => startDrag(e.touches[0]));
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleDrag(e.touches[0]); }, {passive: false});
        window.addEventListener('touchend', endDrag);

        function getMouseAngle(e) {
            const rect = canvas.getBoundingClientRect();
            return Math.atan2(e.clientY - (rect.top + rect.height/2), e.clientX - (rect.left + rect.width/2));
        }

        function startDrag(e) {
            if (isSpinning) return;
            isDragging = true;
            lastMouseAngle = getMouseAngle(e);
            lastTimestamp = performance.now();
            angularVelocity = 0;
        }

        function handleDrag(e) {
            if (!isDragging) return;
            const currentAngle = getMouseAngle(e);
            const deltaAngle = currentAngle - lastMouseAngle;
            rotation += deltaAngle;
            const now = performance.now();
            const dt = now - lastTimestamp;
            if (dt > 0) angularVelocity = deltaAngle / dt * 16;
            lastMouseAngle = currentAngle;
            lastTimestamp = now;
            drawWheel();
        }

        function endDrag() {
            if (!isDragging) return;
            isDragging = false;
            if (Math.abs(angularVelocity) > 0.1) {
                isSpinning = true;
                spinWithVelocity();
            }
        }

        function spinWithVelocity() {
            const friction = 0.99;
            function animate() {
                rotation += angularVelocity;
                angularVelocity *= friction;
                drawWheel();
                if (Math.abs(angularVelocity) > 0.003) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    angularVelocity = 0;
                    calculateWinner();
                }
            }
            requestAnimationFrame(animate);
        }

        function playTick() {
            if (!soundEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(350, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
            osc.start(); osc.stop(audioCtx.currentTime + 0.03);
            
            const pointer = document.getElementById('wheelPointer');
            pointer.classList.remove('pointer-hit');
            void pointer.offsetWidth;
            pointer.classList.add('pointer-hit');
        }

        function init() {
            if(localStorage.getItem('pickitup-dark') === 'true') document.documentElement.classList.add('dark');
            updateSoundIcon();
            if (!wheels[currentWheelIdx].items.length && wheels.length === 1) openStartOverlay();
            renderWheels();
            renderUI();
            drawWheel();
            updateHistoryUI();
        }

        function renderWheels() {
            const container = document.getElementById('wheelTabs');
            container.innerHTML = "";
            wheels.forEach((w, i) => {
                const isActive = (i === currentWheelIdx);
                const btn = document.createElement('div');
                btn.className = `group relative px-4 py-2.5 rounded text-[9px] font-black uppercase tracking-wider cursor-pointer border ui-element mb-1 ${isActive ? 'bg-slate-900 dark:bg-white text-white dark:text-black border-transparent shadow-sm scale-105' : 'text-slate-400 bg-white dark:bg-white/5 border-slate-200 dark:border-white/5 hover:border-slate-400'}`;
                btn.innerHTML = `
                    <div onclick="switchWheel(${i})" class="truncate pr-8 text-center w-full">${w.name}</div>
                    ${wheels.length > 1 ? `<button onclick="deleteWheel(event, ${i})" class="absolute right-2 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 text-[10px] text-red-500"><i class="fas fa-times"></i></button>` : ''}
                `;
                container.appendChild(btn);
            });
        }

        function switchWheel(idx) {
            if (isSpinning) return;
            currentWheelIdx = idx;
            save(); renderWheels(); renderUI(); drawWheel(); updateHistoryUI();
        }

        function openCreateWheelModal() { document.getElementById('createWheelModal').classList.remove('hidden'); document.getElementById('newWheelNameInput').focus(); }
        function closeCreateWheelModal() { document.getElementById('createWheelModal').classList.add('hidden'); document.getElementById('newWheelNameInput').value = ""; }
        function confirmCreateWheel() {
            const name = document.getElementById('newWheelNameInput').value.trim();
            if (name) {
                wheels.push({ id: Date.now(), name, items: [] });
                currentWheelIdx = wheels.length - 1;
                save(); renderWheels(); renderUI(); drawWheel();
                closeCreateWheelModal(); openStartOverlay();
            }
        }

        function focusWheelTitle() {
            const title = document.getElementById('currentWheelName');
            title.focus();
            const range = document.createRange();
            const selection = window.getSelection();
            range.selectNodeContents(title);
            range.collapse(false);
            selection.removeAllRanges();
            selection.addRange(range);
        }

        function applyTemplate(id) {
            const t = templates[id];
            wheels[currentWheelIdx].name = t.name;
            wheels[currentWheelIdx].items = t.items.map(text => ({ text, wins: 0, c: `hsl(${Math.random() * 360}, 60%, 60%)` }));
            save(); renderWheels(); renderUI(); drawWheel(); updateHistoryUI(); closeStartOverlay();
        }

        function addOption() {
            const input = document.getElementById('optionInput');
            const val = input.value.trim();
            if (val) {
                wheels[currentWheelIdx].items.push({ text: val, wins: 0, c: `hsl(${Math.random() * 360}, 60%, 60%)` });
                input.value = ""; save(); renderUI(); drawWheel(); updateHistoryUI(); input.focus();
            }
        }

        function removeOption(idx) { wheels[currentWheelIdx].items.splice(idx, 1); save(); renderUI(); drawWheel(); updateHistoryUI(); }

        function renderUI() {
            const wheel = wheels[currentWheelIdx];
            document.getElementById('currentWheelName').textContent = wheel.name;
            const list = document.getElementById('optionsList');
            list.innerHTML = "";
            wheel.items.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-3 bg-white dark:bg-white/5 rounded border border-slate-200 dark:border-white/10 ui-element mb-1 shadow-sm";
                div.innerHTML = `
                    <div class="flex items-center gap-3 truncate">
                        <div class="w-3 h-3 rounded-sm" style="background:${item.c}"></div>
                        <span class="text-[10px] font-bold truncate tracking-tight text-slate-600 dark:text-slate-300">${item.text}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        ${item.wins > 0 ? `<span class="text-[8px] font-black opacity-30 tracking-tighter text-slate-400">${item.wins} W</span>` : ''}
                        <button onclick="removeOption(${i})" class="text-slate-300 group-hover:text-red-500 transition-colors"><i class="fas fa-times-circle text-xs"></i></button>
                    </div>
                `;
                list.appendChild(div);
            });
            document.getElementById('statDraws').textContent = totalDraws;
        }

        function updateWheelName(t) { if (t.trim()) { wheels[currentWheelIdx].name = t.trim(); save(); renderWheels(); } }

        function save() {
            localStorage.setItem('pickitup-wheels', JSON.stringify(wheels));
            localStorage.setItem('pickitup-draws', totalDraws);
            localStorage.setItem('pickitup-current', currentWheelIdx);
        }

        function drawWheel() {
            const centerX = canvas.width / 2, centerY = canvas.height / 2, radius = canvas.width / 2 - 30;
            const items = wheels[currentWheelIdx].items;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (!items.length) {
                ctx.beginPath(); ctx.arc(centerX, centerY, radius, 0, Math.PI * 2); ctx.fillStyle = "#e5e7eb"; ctx.fill(); 
                ctx.strokeStyle = "#d1d5db"; ctx.lineWidth = 2; ctx.stroke();
                return;
            }

            const sliceAngle = (Math.PI * 2) / items.length;
            const pointerAngle = Math.PI * 1.5;
            let currentNormalized = (pointerAngle - rotation) % (Math.PI * 2);
            if (currentNormalized < 0) currentNormalized += Math.PI * 2;
            const currentSegIdx = Math.floor(currentNormalized / sliceAngle);
            
            if (currentSegIdx !== lastSegIdx && (isSpinning || isDragging)) {
                playTick();
                lastSegIdx = currentSegIdx;
            }

            let currentAngle = rotation;
            items.forEach((item, i) => {
                ctx.beginPath(); ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, currentAngle, currentAngle + sliceAngle);
                ctx.fillStyle = item.c; ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 4; ctx.stroke();
                
                ctx.save(); ctx.translate(centerX, centerY); ctx.rotate(currentAngle + sliceAngle/2);
                ctx.textAlign = "right"; ctx.fillStyle = "white"; ctx.font = "800 38px 'Plus Jakarta Sans'";
                ctx.fillText(item.text, radius - 45, 15); ctx.restore();
                currentAngle += sliceAngle;
            });

            ctx.beginPath(); ctx.arc(centerX, centerY, 55, 0, Math.PI * 2); ctx.fillStyle = "white"; ctx.fill();
            ctx.strokeStyle = "#ccc"; ctx.lineWidth = 1; ctx.stroke();
            ctx.beginPath(); ctx.arc(centerX, centerY, 20, 0, Math.PI * 2); ctx.fillStyle = "black"; ctx.fill();
        }

        let lastSegIdx = -1;
        function spinWheel() {
            if (isSpinning || !wheels[currentWheelIdx].items.length) return;
            isSpinning = true; document.getElementById('spinBtn').disabled = true;
            angularVelocity = 0.5 + Math.random() * 0.4;
            spinWithVelocity();
        }

        function calculateWinner() {
            const wheel = wheels[currentWheelIdx];
            if (!wheel.items.length) return;
            let angle = (Math.PI * 1.5 - (rotation % (Math.PI * 2))) % (Math.PI * 2);
            if (angle < 0) angle += Math.PI * 2;
            let idx = Math.floor((angle / (Math.PI * 2)) * wheel.items.length);
            idx = Math.max(0, Math.min(idx, wheel.items.length - 1));
            const winner = wheel.items[idx];
            winner.wins = (winner.wins || 0) + 1;
            showWinner(winner);
            document.getElementById('spinBtn').disabled = false;
        }

        function showWinner(item) {
            const modal = document.getElementById('resultModal');
            document.getElementById('winnerName').textContent = item.text;
            modal.classList.remove('hidden');
            totalDraws++; save(); renderUI(); updateHistoryUI();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 }, colors: [item.c, '#000000'] });
        }

        function updateHistoryUI() {
            const statsContainer = document.getElementById('historyStats');
            const wheel = wheels[currentWheelIdx];
            if (!wheel.items.length) { 
                statsContainer.innerHTML = `<p class="text-[9px] text-slate-400 italic text-center py-4">Aucune donnée</p>`; 
                return; 
            }

            const totalWins = wheel.items.reduce((acc, curr) => acc + (curr.wins || 0), 0);
            const sortedItems = [...wheel.items].sort((a, b) => (b.wins || 0) - (a.wins || 0));

            statsContainer.innerHTML = sortedItems.map(item => {
                const winRate = totalWins > 0 ? ((item.wins || 0) / totalWins * 100).toFixed(0) : 0;
                
                return `
                    <div class="bg-white dark:bg-white/5 border border-slate-300 dark:border-white/10 p-3 mb-1.5 rounded">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[9px] font-black uppercase truncate pr-2 opacity-70">${item.text}</span>
                            <span class="text-slate-900 dark:text-white font-black text-[10px]">${item.wins || 0} W</span>
                        </div>
                        <div class="flex gap-2 items-center">
                            <div class="flex-1 bg-slate-200 dark:bg-black/20 rounded h-1 overflow-hidden">
                                <div class="h-full bg-slate-400" style="width: ${winRate}%"></div>
                            </div>
                            <span class="text-[7px] font-black text-slate-400 whitespace-nowrap uppercase">${winRate}%</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function generateWithAI() {
            const promptValue = document.getElementById('aiPrompt').value;
            if (!promptValue) return;
            
            const btn = document.getElementById('aiBtn');
            const progContainer = document.getElementById('aiProgressContainer');
            const progBar = document.getElementById('aiProgressBar');
            const progPercent = document.getElementById('aiProgressPercent');

            btn.classList.add('hidden');
            progContainer.classList.remove('hidden');
            
            let progress = 0;
            const progressInterval = setInterval(() => {
                if (progress < 90) {
                    progress += Math.random() * 15;
                    if (progress > 90) progress = 90;
                    progBar.style.width = `${progress}%`;
                    progPercent.textContent = `${Math.round(progress)}%`;
                }
            }, 300);

            const systemPrompt = "Tu es un assistant qui génère des listes de choix. Retourne UNIQUEMENT un JSON {choices: [\"nom1\", ...]} contenant 8 idées pour : " + promptValue;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Génère une liste pour : ${promptValue}` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const res = await response.json();
                const data = JSON.parse(res.candidates[0].content.parts[0].text);
                
                if (data.choices) {
                    clearInterval(progressInterval);
                    progBar.style.width = `100%`;
                    progPercent.textContent = `100%`;
                    
                    setTimeout(() => {
                        wheels[currentWheelIdx].items = data.choices.map(c => ({ text: c, wins: 0, c: `hsl(${Math.random() * 360}, 60%, 60%)` }));
                        save(); renderUI(); drawWheel(); updateHistoryUI();
                        progContainer.classList.add('hidden');
                        btn.classList.remove('hidden');
                        progBar.style.width = `0%`;
                    }, 500);
                }
            } catch(e) { 
                clearInterval(progressInterval);
                progContainer.classList.add('hidden');
                btn.classList.remove('hidden');
            }
        }

        function closeModal() { document.getElementById('resultModal').classList.add('hidden'); }
        function toggleDarkMode() {
            const d = document.documentElement.classList.toggle('dark');
            localStorage.setItem('pickitup-dark', d);
            document.getElementById('themeIcon').className = d ? 'fas fa-sun' : 'fas fa-moon';
        }
        function toggleSound() { soundEnabled = !soundEnabled; localStorage.setItem('pickitup-sound', soundEnabled); updateSoundIcon(); }
        function updateSoundIcon() { document.getElementById('soundBtn').innerHTML = `<i class="fas ${soundEnabled ? 'fa-volume-up' : 'fa-volume-mute'}"></i>`; }
        function openStartOverlay() { document.getElementById('startOverlay').classList.remove('hidden'); }
        function closeStartOverlay() { document.getElementById('startOverlay').classList.add('hidden'); }
        
        function deleteWheel(event, idx) {
            event.stopPropagation();
            if (wheels.length <= 1) return;
            wheels.splice(idx, 1);
            if (currentWheelIdx >= wheels.length) currentWheelIdx = wheels.length - 1;
            save(); renderWheels(); renderUI(); drawWheel(); updateHistoryUI();
        }

        document.getElementById('optionInput').addEventListener('keypress', (e) => e.key === 'Enter' && addOption());
        document.getElementById('newWheelNameInput').addEventListener('keypress', (e) => e.key === 'Enter' && confirmCreateWheel());

        init();
    </script>
</body>
</html>
